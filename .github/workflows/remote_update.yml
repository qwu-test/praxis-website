name: Remote Update Notice

on:
  repository_dispatch:
    # This must match the 'event_type' in your Python script
    types: [local_data_update]

jobs:
  update-notice:
    runs-on: ubuntu-latest
    # Permissions needed to comment and push to the repo
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Overwrite notice.txt
        run: |
          # Takes the message from your Python script and overwrites notice.txt
          echo "${{ github.event.client_payload.message }}" > notice.txt

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Check if notice.txt actually changed compared to the last commit
          if git diff --quiet notice.txt; then
            echo "No changes detected. Skipping commit."
          else
            git add notice.txt
            git commit -m "Automated update: New notice received"
            git push
          fi
