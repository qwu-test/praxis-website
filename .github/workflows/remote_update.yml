name: Remote Update Notice
on:
  repository_dispatch:
    # This 'type' must match what you send in your Python script
    types: [local_data_update]

jobs:
  update-notice:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Overwrite notice.txt
        run: |
          # Takes the message from the API call and writes it to notice.txt
          echo "${{ github.event.client_payload.message }}" > notice.txt

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add notice.txt
          # The '|| exit 0' prevents the workflow from failing if the text is identical
          git commit -m "Automated update to notice.txt" || exit 0
          git push
