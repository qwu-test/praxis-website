<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Page</title>
    <style>
        :root { --primary: #005596; --bg: #f0f4f8; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: var(--bg); color: #2c3e50; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 90%; }
        
        h1 { margin-bottom: 20px; color: var(--primary); }

        /* 公告区域样式 */
        #statusBanner { min-height: 60px; display: flex; align-items: center; justify-content: center; margin-top: 20px; }

        /* 按钮样式 */
        .hobby-btn {
            background-color: var(--primary);
            color: white !important;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            display: inline-block;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0, 85, 150, 0.3);
        }
        .hobby-btn:hover { transform: translateY(-2px); background-color: #003d6b; }
        
        .default-text { color: #7f8c8d; font-style: italic; }
    </style>
</head>
<body>

<div class="card">
    <h1>Welcome</h1>
    <p>Check my latest update below:</p>

    <div id="statusBanner">
        <div id="statusText" class="default-text">Loading updates...</div>
    </div>
</div>

<script>
    async function loadRemoteNotice() {
        try {
            // 获取 notice.txt 并强制刷新缓存
            const response = await fetch('notice.txt?t=' + Date.now(), { cache: "no-store" });
            if (response.ok) {
                const text = await response.text();
                const cleanText = text.trim();
                
                // 正则表达式查找链接
                const urlRegex = /(https?:\/\/[^\s]+)/g;
                const matches = cleanText.match(urlRegex);

                if (matches && matches.length > 0) {
                    // 如果发现链接，直接替换为按钮，隐藏文字和网址
                    document.getElementById('statusBanner').innerHTML = 
                        `<a href="${matches[0]}" target="_blank" class="hobby-btn">My Hobby Page</a>`;
                } else {
                    // 如果没有链接，显示默认文字
                    document.getElementById('statusText').innerText = "No active hobby link at the moment.";
                }
            }
        } catch (e) {
            document.getElementById('statusText').innerText = "Stay tuned!";
        }
    }

    window.onload = loadRemoteNotice;
</script>

</body>
</html>
